<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="kanahei.png">
  <link rel="icon" type="image/png" href="kanahei.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="我的管理App">
  <meta name="theme-color" content="#6366f1">
  <title>家事與任務管理 App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    :root{
      --primary:#5b52e8;--primary-light:#ede9fe;--primary-dark:#4338ca;
      --accent:#7c3aed;--accent-light:#f5f3ff;
      --success:#10b981;--success-light:#d1fae5;
      --warning:#f59e0b;--warning-light:#fef3c7;
      --danger:#ef4444;--danger-light:#fee2e2;
      --surface:#fff;--bg:#f4f6fb;
      --border:#e8edf5;--border-light:#f1f5f9;
      --text-primary:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;
      --shadow-sm:0 1px 4px rgba(0,0,0,.07);
      --shadow-md:0 4px 16px rgba(0,0,0,.10);
      --shadow-lg:0 8px 32px rgba(0,0,0,.13);
      --radius-sm:8px;--radius-md:14px;--radius-lg:20px;
    }
    *{font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);padding-bottom:84px}
    .page{display:none}.page.active{display:block}
    .nav-item{transition:all .2s;background:none;border:none;cursor:pointer;position:relative}
    .nav-item.active .nav-icon{color:var(--primary)}
    .nav-item.active .nav-label{color:var(--primary);font-weight:700}
    .nav-item.active::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--primary);border-radius:50%}
    .nav-item .nav-icon{color:#b0bbc8}.nav-item .nav-label{color:#b0bbc8}
    input[type="date"]{-webkit-appearance:none;appearance:auto}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(2px)}
    .modal-overlay.open{display:flex}
    .modal-sheet{width:100%;max-width:520px;border-radius:24px 24px 0 0;box-shadow:var(--shadow-lg);background:var(--surface);padding:24px 20px;max-height:92vh;overflow-y:auto}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px}
    .card{background:var(--surface);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
    .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.01em}
    .badge-urgent{background:#fee2e2;color:#dc2626}.badge-normal{background:#dbeafe;color:#2563eb}.badge-low{background:#d1fae5;color:#059669}
    .badge-done{background:#dcfce7;color:#15803d}.badge-delayed{background:#fff7ed;color:#c2410c}
    .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .section-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .empty-state{text-align:center;padding:32px 16px;color:var(--text-muted)}
    .empty-state .material-symbols-outlined{font-size:44px;display:block;margin-bottom:8px;opacity:.5}
    select,input[type="text"],input[type="number"],input[type="date"],textarea{
      width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;outline:none;background:var(--surface);font-family:'Noto Sans TC',sans-serif;color:var(--text-primary);transition:border-color .2s,box-shadow .2s}
    select:focus,input:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(91,82,232,.12)}
    label{display:block;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
    .form-group{margin-bottom:16px}
    .btn-primary{background:var(--primary);color:#fff;padding:13px 24px;border-radius:var(--radius-sm);font-weight:700;border:none;cursor:pointer;font-size:15px;transition:background .15s,transform .1s;box-shadow:0 2px 8px rgba(91,82,232,.3)}
    .btn-primary:active{transform:scale(.97);background:var(--primary-dark)}
    .btn-secondary{background:var(--border-light);color:var(--text-secondary);padding:13px 24px;border-radius:var(--radius-sm);font-weight:600;border:none;cursor:pointer;font-size:15px;transition:background .15s}
    .btn-secondary:active{background:#e2e8f0}
    .animate-in{animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .safe-bottom{padding-bottom:env(safe-area-inset-bottom,0px)}
    .area-chip{cursor:pointer;transition:all .2s;border:2px solid transparent}
    .area-chip.selected{transform:scale(1.02);box-shadow:0 4px 18px rgba(0,0,0,.12)}
    .date-tag{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--border-light);color:#64748b;white-space:nowrap;min-width:78px;justify-content:center;transition:background .15s}
    .date-tag:hover{background:#e2e8f0}.date-tag.overdue{background:#fee2e2;color:#dc2626}.date-tag.today-tag{background:var(--primary-light);color:var(--primary)}
    .popup-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:50;min-width:130px;overflow:hidden;display:none}
    .popup-menu.show{display:block}
    .popup-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;border:none;background:none;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-primary)}
    .popup-menu button:hover{background:var(--bg)}
    .popup-menu button.danger{color:var(--danger)}
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .filter-row+.filter-row{margin-top:8px}
    .filter-chip{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:#64748b;cursor:pointer;transition:all .2s;white-space:nowrap}
    .filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .filter-chip:hover:not(.active){background:var(--border-light)}
    .hw-row{display:grid;grid-template-columns:34px 1fr 90px auto;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--border-light)}
    .hw-row:last-child{border-bottom:none}
    .hw-row.task-row{grid-template-columns:34px 1fr 90px}
    .hw-row .hw-date-col{text-align:right;justify-self:end}
    .hw-row .hw-area-col{justify-self:end}
    .settings-card{background:var(--surface);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);padding:20px;margin-bottom:14px}
    .settings-card h3{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:8px;letter-spacing:.02em}
    .settings-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-light)}
    .settings-item:last-child{border-bottom:none}
    .settings-item label{margin-bottom:0;font-size:14px;font-weight:500;color:var(--text-secondary);letter-spacing:0;text-transform:none}
    .settings-item .desc{font-size:11px;color:var(--text-muted);margin-top:2px}
    .toggle{position:relative;width:50px;height:28px;background:#cbd5e1;border-radius:999px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
    .toggle.on{background:var(--primary)}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .toggle.on::after{transform:translateX(22px)}
    /* Delay modal custom date section */
    .delay-custom-section{display:none;margin-top:12px;padding:14px;background:var(--bg);border-radius:var(--radius-sm);border:1.5px solid var(--border)}
    .delay-custom-section.show{display:block}
    .delay-day-btn{border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;padding:10px 0}
    .delay-day-btn:hover{border-color:var(--primary);background:var(--primary-light)}
    .delay-day-btn:active{transform:scale(.96)}
    /* Weekend badge */
    .badge-weekend{background:#fef3c7;color:#b45309;font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
    .hw-select-cb{width:20px;height:20px;border:2px solid #cbd5e1;border-radius:6px;cursor:pointer;transition:all .15s;flex-shrink:0}
    .hw-select-cb.checked{background:var(--primary);border-color:var(--primary);display:flex;align-items:center;justify-content:center}
    .hw-select-cb.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
    .hw-card-selectable{cursor:pointer;transition:all .15s}
    .hw-card-selectable.selected-card{background:rgba(91,82,232,.05);border-color:var(--primary)}
    .batch-mode-bar{position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:#fff;padding:12px 16px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;border-top:1px solid rgba(0,0,0,.1)}
    .batch-mode-bar p{font-weight:600}
    .batch-mode-bar button{padding:8px 16px;background:rgba(255,255,255,.25);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-left:8px;font-size:13px}
    .batch-mode-bar button:active{background:rgba(255,255,255,.35)}
    .batch-mode-bar .danger-action{background:#dc2626}
    .hw-batch-actions{display:flex;gap:8px}
    .overdue-notice{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#fee2e2;color:#dc2626;border-radius:var(--radius-md);margin-bottom:16px;border-left:4px solid #dc2626;font-size:13px;font-weight:600}
    .overdue-notice .material-symbols-outlined{font-size:18px}
    /* Version info */
    .version-info{font-size:11px;color:var(--text-muted);text-align:center;padding:8px;margin-top:16px}
  </style>
</head>
<body>
  <!-- TAB NAVIGATION -->
  <div style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;z-index:99;padding-bottom:env(safe-area-inset-bottom,0px)" class="safe-bottom">
    <button class="nav-item active" onclick="showPage('todo')">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px">
        <span class="nav-icon material-symbols-outlined">check_circle</span>
        <span class="nav-label" style="font-size:11px">待辦</span>
      </div>
    </button>
    <button class="nav-item" onclick="showPage('tasks')">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px">
        <span class="nav-icon material-symbols-outlined">assignment</span>
        <span class="nav-label" style="font-size:11px">任務</span>
      </div>
    </button>
    <button class="nav-item" onclick="showPage('housework')">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px">
        <span class="nav-icon material-symbols-outlined">cleaning_services</span>
        <span class="nav-label" style="font-size:11px">家事</span>
      </div>
    </button>
    <button class="nav-item" onclick="showPage('settings')">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px">
        <span class="nav-icon material-symbols-outlined">settings</span>
        <span class="nav-label" style="font-size:11px">設定</span>
      </div>
    </button>
  </div>

  <!-- PAGE: TODO -->
  <div id="page-todo" class="page active">
    <div style="padding:16px 16px 100px">
      <div class="section-header">
        <div class="section-icon" style="background:var(--primary-light)">
          <span class="material-symbols-outlined" style="color:var(--primary);font-size:20px">check_circle</span>
        </div>
        <h1 style="font-size:20px;font-weight:700;color:var(--text-primary)">待辦清單</h1>
      </div>
      <div class="filter-row">
        <button class="filter-chip active" onclick="setTodoFilter('all')">全部</button>
        <button class="filter-chip" onclick="setTodoFilter('urgent')">緊急</button>
        <button class="filter-chip" onclick="setTodoFilter('normal')">一般</button>
        <button class="filter-chip" onclick="setTodoFilter('low')">低</button>
        <button class="filter-chip" onclick="setTodoFilter('done')">已完成</button>
      </div>
      <div style="margin-top:16px">
        <button class="btn-primary w-full" onclick="openTodoModal()">+ 新增待辦項目</button>
      </div>
      <div id="todo-cards" style="margin-top:20px"></div>
    </div>
  </div>

  <!-- PAGE: TASKS -->
  <div id="page-tasks" class="page">
    <div style="padding:16px 16px 100px">
      <div class="section-header">
        <div class="section-icon" style="background:#dbeafe">
          <span class="material-symbols-outlined" style="color:#2563eb;font-size:20px">assignment</span>
        </div>
        <h1 style="font-size:20px;font-weight:700;color:var(--text-primary)">任務管理</h1>
      </div>
      <div class="filter-row">
        <button class="filter-chip active" onclick="setTaskFilter('all')">全部</button>
        <button class="filter-chip" onclick="setTaskFilter('active')">進行中</button>
        <button class="filter-chip" onclick="setTaskFilter('completed')">已完成</button>
      </div>
      <div style="margin-top:16px">
        <button class="btn-primary w-full" onclick="openTaskModal()">+ 新增任務</button>
      </div>
      <div id="task-cards" style="margin-top:20px"></div>
    </div>
  </div>

  <!-- PAGE: HOUSEWORK -->
  <div id="page-housework" class="page">
    <div style="padding:16px 16px 100px">
      <div class="section-header">
        <div class="section-icon" style="background:#d1fae5">
          <span class="material-symbols-outlined" style="color:#10b981;font-size:20px">cleaning_services</span>
        </div>
        <div style="flex:1">
          <h1 style="font-size:20px;font-weight:700;color:var(--text-primary)">家事管理</h1>
          <button onclick="toggleBatchMode()" style="margin-top:8px;padding:6px 12px;background:var(--border-light);border:none;border-radius:6px;font-size:12px;color:var(--text-secondary);cursor:pointer">
            <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle">select_all</span> 批次選取
          </button>
        </div>
      </div>
      <div id="hw-overdue-notice"></div>
      <div id="hw-area-chips" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px"></div>
      <button class="btn-primary w-full" onclick="openHouseworkModal()">+ 新增家事</button>
      <div id="housework-cards" style="margin-top:20px"></div>
    </div>
  </div>

  <!-- PAGE: SETTINGS -->
  <div id="page-settings" class="page">
    <div style="padding:16px 16px 100px">
      <div class="section-header">
        <div class="section-icon" style="background:#f5f3ff">
          <span class="material-symbols-outlined" style="color:#7c3aed;font-size:20px">settings</span>
        </div>
        <h1 style="font-size:20px;font-weight:700;color:var(--text-primary)">設定</h1>
      </div>

      <div class="settings-card">
        <h3><span class="material-symbols-outlined" style="font-size:18px">person</span> 個人資訊</h3>
        <div class="form-group">
          <label>名稱</label>
          <input type="text" id="set-name" onchange="saveSetting('userName',this.value)">
        </div>
        <div class="form-group">
          <label>電郵</label>
          <input type="email" id="set-email" onchange="saveSetting('userEmail',this.value)">
        </div>
      </div>

      <div class="settings-card">
        <h3><span class="material-symbols-outlined" style="font-size:18px">visibility</span> 顯示選項</h3>
        <div class="settings-item">
          <label>顯示逾期項目</label>
          <button class="toggle" id="tog-overdue" onclick="toggleSetting('showOverdue',this)"></button>
        </div>
        <div class="settings-item">
          <label>顯示備註</label>
          <button class="toggle" id="tog-notes" onclick="toggleSetting('showNotes',this)"></button>
        </div>
        <div class="settings-item">
          <label>顯示描述</label>
          <button class="toggle" id="tog-desc" onclick="toggleSetting('showDesc',this)"></button>
        </div>
      </div>

      <div class="settings-card">
        <h3><span class="material-symbols-outlined" style="font-size:18px">download</span> 數據管理</h3>
        <div style="display:flex;gap:8px;flex-direction:column">
          <button class="btn-primary" onclick="exportData()">📥 導出數據</button>
          <button class="btn-secondary" onclick="document.getElementById('import-input').click()">📤 匯入數據</button>
          <input type="file" id="import-input" accept=".json" onchange="importData(event)" style="display:none">
          <button class="btn-secondary" onclick="copyShareLink()">🔗 複製分享連結</button>
        </div>
      </div>

      <div class="version-info">App 版本 v1.0 | PWA離線可用</div>
    </div>
  </div>

  <!-- MODALS -->
  <!-- TODO Modal -->
  <div class="modal-overlay" id="todoModal">
    <div class="modal-sheet animate-in">
      <div class="modal-handle"></div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">待辦項目</h2>
      <div class="form-group">
        <label>項目名稱</label>
        <input type="text" id="todo-name" placeholder="輸入待辦項目">
      </div>
      <div class="form-group">
        <label>優先級</label>
        <select id="todo-priority">
          <option value="normal">一般</option>
          <option value="urgent">緊急</option>
          <option value="low">低</option>
        </select>
      </div>
      <div class="form-group">
        <label>截止日期</label>
        <input type="date" id="todo-deadline">
      </div>
      <div class="form-group">
        <label>備註</label>
        <textarea id="todo-notes" placeholder="輸入備註" style="resize:none;height:80px"></textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary flex-1" onclick="saveTodo()">儲存</button>
        <button class="btn-secondary flex-1" onclick="closeModal('todoModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- TASK Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal-sheet animate-in">
      <div class="modal-handle"></div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">新增任務</h2>
      <div class="form-group">
        <label>任務名稱</label>
        <input type="text" id="task-name" placeholder="輸入任務名稱">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="task-desc" placeholder="輸入任務描述" style="resize:none;height:80px"></textarea>
      </div>
      <div class="form-group">
        <label>開始日期</label>
        <input type="date" id="task-start">
      </div>
      <div class="form-group">
        <label>完成日期</label>
        <input type="date" id="task-deadline">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary flex-1" onclick="saveTask()">儲存</button>
        <button class="btn-secondary flex-1" onclick="closeModal('taskModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- HOUSEWORK Modal -->
  <div class="modal-overlay" id="houseworkModal">
    <div class="modal-sheet animate-in">
      <div class="modal-handle"></div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">新增家事</h2>
      <div class="form-group">
        <label>家事名稱</label>
        <input type="text" id="hw-name" placeholder="輸入家事名稱">
      </div>
      <div class="form-group">
        <label>區域</label>
        <select id="hw-area">
          <option value="廚房">廚房</option>
          <option value="浴室">浴室</option>
          <option value="臥室">臥室</option>
          <option value="客廳">客廳</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>頻率</label>
        <select id="hw-frequency">
          <option value="daily">每天</option>
          <option value="weekly">每週</option>
          <option value="monthly">每月</option>
          <option value="once">單次</option>
        </select>
      </div>
      <div class="form-group">
        <label>備註</label>
        <textarea id="hw-notes" placeholder="輸入備註" style="resize:none;height:80px"></textarea>
      </div>
      <div class="form-group">
        <div class="settings-item" style="padding:0;border:none">
          <label style="margin:0">週末跳過</label>
          <button class="toggle" id="hw-weekend-toggle" onclick="this.classList.toggle('on')"></button>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary flex-1" onclick="saveHousework()">儲存</button>
        <button class="btn-secondary flex-1" onclick="closeModal('houseworkModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- DELAY Modal -->
  <div class="modal-overlay" id="delayModal">
    <div class="modal-sheet animate-in">
      <div class="modal-handle"></div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">延後任務</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        <button class="delay-day-btn" onclick="setDelayDate(1)">明天</button>
        <button class="delay-day-btn" onclick="setDelayDate(3)">3天後</button>
        <button class="delay-day-btn" onclick="setDelayDate(7)">1週後</button>
        <button class="delay-day-btn" onclick="setDelayDate(14)">2週後</button>
      </div>
      <div class="delay-custom-section" id="delay-custom-section">
        <label>自訂日期</label>
        <input type="date" id="delay-custom-date" style="margin-bottom:12px">
      </div>
      <button class="filter-chip" onclick="toggleDelayCustom()" style="width:100%;padding:10px;margin-bottom:16px">自訂日期</button>
      <div style="display:flex;gap:8px">
        <button class="btn-primary flex-1" onclick="confirmDelay()">確認</button>
        <button class="btn-secondary flex-1" onclick="closeModal('delayModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- BATCH DATE Modal -->
  <div class="modal-overlay" id="batchDateModal">
    <div class="modal-sheet animate-in">
      <div class="modal-handle"></div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">批次設定日期</h2>
      <div class="form-group">
        <label>新日期</label>
        <input type="date" id="batch-custom-date-input">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary flex-1" onclick="batchSetDate()">確認</button>
        <button class="btn-secondary flex-1" onclick="closeModal('batchDateModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- BATCH MODE BAR -->
  <div class="batch-mode-bar" id="batch-mode-bar" style="display:none">
    <p id="batch-count">已選 0 項</p>
    <div class="hw-batch-actions">
      <button onclick="openBatchDateModal()">📅 設定日期</button>
      <button class="danger-action" onclick="batchDeleteHousework()">🗑️ 刪除</button>
      <button onclick="exitBatchMode()">✕ 取消</button>
    </div>
  </div>

  <script>
    // Service Worker Registration
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('service-worker.js').then(reg=>{
        console.log('✓ Service Worker 已註冊',reg);
      }).catch(err=>{
        console.warn('✗ Service Worker 註冊失敗',err);
      });
    }

    // GLOBALS
    let todo=JSON.parse(localStorage.getItem('todo')||'[]');
    let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');
    let housework=JSON.parse(localStorage.getItem('housework')||'[]');
    let todoFilter='all';
    let taskFilter='all';
    let hwAreaFilter=null;
    let hwBatchMode=false;
    let hwSelected=new Set();
    let delayTarget={type:null,id:null};
    let editingId=null;
    const todayStr=new Date().toISOString().split('T')[0];

    function saveData(){
      localStorage.setItem('todo',JSON.stringify(todo));
      localStorage.setItem('tasks',JSON.stringify(tasks));
      localStorage.setItem('housework',JSON.stringify(housework));
    }
    function loadData(){
      const hashData=location.hash.match(/#data=(.+)/);
      if(hashData){
        try{
          const decoded=JSON.parse(decodeURIComponent(escape(atob(hashData[1]))));
          todo=decoded.tasks||todo;
          tasks=decoded.tasks||tasks;
          housework=decoded.housework||housework;
          saveData();
          alert('已從連結載入數據');
        }catch(e){console.error('載入失敗',e)}
      }
    }

    function showPage(page){
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.getElementById('page-'+page).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      event.target.closest('.nav-item').classList.add('active');
    }
    function openModal(id){document.getElementById(id).classList.add('open')}
    function closeModal(id){document.getElementById(id).classList.remove('open')}

    // TODO
    function openTodoModal(id=null){
      editingId=id;
      const m=todo.find(t=>t.id===id);
      document.getElementById('todo-name').value=m?.name||'';
      document.getElementById('todo-priority').value=m?.priority||'normal';
      document.getElementById('todo-deadline').value=m?.deadline||'';
      document.getElementById('todo-notes').value=m?.notes||'';
      openModal('todoModal');
    }
    function saveTodo(){
      const name=document.getElementById('todo-name').value.trim();
      if(!name){alert('請輸入名稱');return}
      if(editingId){
        const idx=todo.findIndex(t=>t.id===editingId);
        todo[idx]={...todo[idx],name,priority:document.getElementById('todo-priority').value,deadline:document.getElementById('todo-deadline').value,notes:document.getElementById('todo-notes').value};
      }else{
        todo.push({id:Date.now().toString(),name,priority:document.getElementById('todo-priority').value,deadline:document.getElementById('todo-deadline').value,notes:document.getElementById('todo-notes').value,completed:false});
      }
      saveData();closeModal('todoModal');renderAll();
    }
    function deleteTodo(id){if(confirm('確定刪除？')){todo=todo.filter(t=>t.id!==id);saveData();renderAll()}}
    function toggleTodoDone(id){const t=todo.find(x=>x.id===id);if(t){t.completed=!t.completed;saveData();renderAll()}}
    function setTodoFilter(f){
      document.querySelectorAll('#page-todo .filter-chip').forEach((c,i)=>c.classList.toggle('active',i===['all','urgent','normal','low','done'].indexOf(f)));
      todoFilter=f;renderTodoPage();
    }

    function renderTodoPage(){
      let filtered=todo;
      if(todoFilter==='done')filtered=todo.filter(t=>t.completed);
      else if(todoFilter!=='all')filtered=todo.filter(t=>t.priority===todoFilter&&!t.completed);
      else filtered=todo.filter(t=>!t.completed);

      document.getElementById('todo-cards').innerHTML=filtered.length?filtered.map(t=>{
        const dcls=t.deadline&&t.deadline<todayStr?'overdue':t.deadline===todayStr?'today-tag':'';
        const badges={urgent:'<span class="badge badge-urgent">🔥 緊急</span>',normal:'<span class="badge badge-normal">📌 一般</span>',low:'<span class="badge badge-low">✓ 低</span>'};
        return `<div class="card p-4 mb-3 animate-in"><div class="flex items-start justify-between"><div class="flex-1"><div class="flex items-center gap-2"><input type="checkbox" ${t.completed?'checked':''} onchange="toggleTodoDone('${t.id}')" style="width:18px;height:18px;cursor:pointer"><p class="font-semibold ${t.completed?'line-through text-gray-400':''}">${t.name}</p></div>${t.deadline?`<button class="date-tag ${dcls}" style="margin-top:6px;cursor:default">${t.deadline}</button>`:''}</div><button onclick="openTodoModal('${t.id}')" style="background:var(--border-light);border:none;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer"><span class="material-symbols-outlined" style="font-size:16px">edit</span></button></div>${t.notes?`<p style="font-size:13px;color:var(--text-secondary);margin-top:8px">${t.notes}</p>`:''}</div>`;
      }).join(''):`<div class="card p-6">${emptyS('沒有待辦項目')}</div>`;
    }

    // TASKS
    function openTaskModal(id=null){
      editingId=id;
      const m=tasks.find(t=>t.id===id);
      document.getElementById('task-name').value=m?.name||'';
      document.getElementById('task-desc').value=m?.description||'';
      document.getElementById('task-start').value=m?.startDate||'';
      document.getElementById('task-deadline').value=m?.deadline||'';
      openModal('taskModal');
    }
    function saveTask(){
      const name=document.getElementById('task-name').value.trim();
      if(!name){alert('請輸入任務名稱');return}
      if(editingId){
        const idx=tasks.findIndex(t=>t.id===editingId);
        tasks[idx]={...tasks[idx],name,description:document.getElementById('task-desc').value,startDate:document.getElementById('task-start').value,deadline:document.getElementById('task-deadline').value};
      }else{
        tasks.push({id:Date.now().toString(),name,description:document.getElementById('task-desc').value,startDate:document.getElementById('task-start').value,deadline:document.getElementById('task-deadline').value,completed:false});
      }
      saveData();closeModal('taskModal');renderAll();
    }
    function deleteTask(id){if(confirm('確定刪除？')){tasks=tasks.filter(t=>t.id!==id);saveData();renderAll()}}
    function toggleTaskDone(id){const t=tasks.find(x=>x.id===id);if(t){t.completed=!t.completed;saveData();renderAll()}}
    function setTaskFilter(f){
      document.querySelectorAll('#page-tasks .filter-chip').forEach((c,i)=>c.classList.toggle('active',i===['all','active','completed'].indexOf(f)));
      taskFilter=f;renderTasksPage();
    }

    function renderTasksPage(){
      let filtered=tasks;
      if(taskFilter==='completed')filtered=tasks.filter(t=>t.completed);
      else if(taskFilter==='active')filtered=tasks.filter(t=>!t.completed);
      document.getElementById('task-cards').innerHTML=filtered.length?filtered.map(t=>`<div class="card p-4 mb-3 animate-in"><div class="flex items-start justify-between"><div class="flex-1"><div class="flex items-center gap-2"><input type="checkbox" ${t.completed?'checked':''} onchange="toggleTaskDone('${t.id}')" style="width:18px;height:18px;cursor:pointer"><p class="font-semibold ${t.completed?'line-through text-gray-400':''}">${t.name}</p></div>${t.deadline?`<p style="font-size:12px;color:var(--text-secondary);margin-top:6px">截止：${t.deadline}</p>`:''}</div><button onclick="openTaskModal('${t.id}')" style="background:var(--border-light);border:none;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer"><span class="material-symbols-outlined" style="font-size:16px">edit</span></button></div>${t.description?`<p style="font-size:13px;color:var(--text-secondary);margin-top:8px">${t.description}</p>`:''}</div>`).join(''):`<div class="card p-6">${emptyS('沒有任務')}</div>`;
    }

    // HOUSEWORK
    function openHouseworkModal(id=null){
      editingId=id;
      const m=housework.find(h=>h.id===id);
      document.getElementById('hw-name').value=m?.name||'';
      document.getElementById('hw-area').value=m?.area||'廚房';
      document.getElementById('hw-frequency').value=m?.frequency||'weekly';
      document.getElementById('hw-notes').value=m?.notes||'';
      document.getElementById('hw-weekend-toggle').classList.toggle('on',m?.weekendMode||false);
      openModal('houseworkModal');
    }
    function saveHousework(){
      const name=document.getElementById('hw-name').value.trim();
      if(!name){alert('請輸入名稱');return}
      const weekendMode=document.getElementById('hw-weekend-toggle').classList.contains('on');
      if(editingId){
        const idx=housework.findIndex(h=>h.id===editingId);
        housework[idx]={...housework[idx],name,area:document.getElementById('hw-area').value,frequency:document.getElementById('hw-frequency').value,notes:document.getElementById('hw-notes').value,weekendMode};
      }else{
        housework.push({id:Date.now().toString(),name,area:document.getElementById('hw-area').value,frequency:document.getElementById('hw-frequency').value,notes:document.getElementById('hw-notes').value,weekendMode,reminderDate:null,lastCompleted:null});
      }
      saveData();closeModal('houseworkModal');renderAll();
    }
    function deleteHousework(id){if(confirm('確定刪除？')){housework=housework.filter(h=>h.id!==id);saveData();renderAll()}}
    function markHouseworkDone(id){const h=housework.find(x=>x.id===id);if(h){h.lastCompleted=todayStr;h.reminderDate=null;saveData();renderAll()}}
    function togglePopup(id,e){
      e.stopPropagation();
      document.querySelectorAll('.popup-menu').forEach(m=>{m.classList.remove('show');m.style.position='';m.style.top='';m.style.bottom='';m.style.right='';});
      const el=document.getElementById('popup-'+id);if(!el)return;
      // Use fixed positioning to escape overflow:hidden containers (fixes mobile clipping)
      const btn=e?.currentTarget||e?.target?.closest('button')||e?.target;
      if(btn){
        const rect=btn.getBoundingClientRect();
        el.style.position='fixed';
        el.style.right=(window.innerWidth-rect.right)+'px';
        el.style.top='';el.style.bottom='';
        const spaceBelow=window.innerHeight-rect.bottom-80;
        if(spaceBelow<130){el.style.bottom=(window.innerHeight-rect.top)+'px';}
        else{el.style.top=(rect.bottom+4)+'px';}
      }
      el.classList.add('show');
    }
    function openDelayModal(type,id){delayTarget={type,id};openModal('delayModal')}
    function toggleDelayCustom(){document.getElementById('delay-custom-section').classList.toggle('show')}
    function setDelayDate(days){
      const d=new Date();d.setDate(d.getDate()+days);
      document.getElementById('delay-custom-date').value=d.toISOString().split('T')[0];
      confirmDelay();
    }
    function confirmDelay(){
      const val=document.getElementById('delay-custom-date').value;
      if(!val){alert('請選擇日期');return}
      if(delayTarget.type==='hw'){
        housework=housework.map(h=>h.id===delayTarget.id?{...h,reminderDate:val}:h);
      }else if(delayTarget.type==='task'){
        tasks=tasks.map(t=>t.id===delayTarget.id?{...t,deadline:val}:t);
      }else if(delayTarget.type==='todo'){
        todo=todo.map(t=>t.id===delayTarget.id?{...t,deadline:val}:t);
      }
      saveData();closeModal('delayModal');renderAll();
    }
    function toggleBatchMode(){hwBatchMode=!hwBatchMode;document.getElementById('batch-mode-bar').style.display=hwBatchMode?'flex':'none';renderHouseworkPage()}
    function toggleHwSelect(id){
      if(hwSelected.has(id))hwSelected.delete(id);
      else hwSelected.add(id);
      document.getElementById('batch-count').textContent=`已選 ${hwSelected.size} 項`;
      renderHouseworkPage();
    }
    function exitBatchMode(){hwBatchMode=false;hwSelected.clear();document.getElementById('batch-mode-bar').style.display='none';renderHouseworkPage()}
    function openBatchDateModal(){openModal('batchDateModal')}
    function batchSetDate(){
      const val=document.getElementById('batch-custom-date-input').value;
      if(!val){alert('請選擇日期');return}
      housework=housework.map(h=>hwSelected.has(h.id)?{...h,reminderDate:val}:h);
      saveData();closeModal('batchDateModal');exitBatchMode();
    }
    function batchDeleteHousework(){
      if(!confirm(`確定刪除 ${hwSelected.size} 項？`))return;
      housework=housework.filter(h=>!hwSelected.has(h.id));
      saveData();exitBatchMode();renderAll();
    }

    function areaColor(area){
      const colors={廚房:{dot:'#f59e0b',bg:'#fef3c7',icon:'🍳'},浴室:{dot:'#3b82f6',bg:'#dbeafe',icon:'🚿'},臥室:{dot:'#ec4899',bg:'#fbcfe8',icon:'🛏️'},客廳:{dot:'#10b981',bg:'#d1fae5',icon:'🛋️'},其他:{dot:'#8b5cf6',bg:'#ede9fe',icon:'📦'}};
      return colors[area]||colors['其他'];
    }
    function dtLbl(date){
      const d=new Date(date),today=new Date(todayStr);
      if(d.toDateString()===today.toDateString())return '今天';
      const diff=Math.floor((d-today)/(1000*60*60*24));
      if(diff<0)return `${Math.abs(diff)} 天前`;
      if(diff===1)return '明天';
      return `${diff} 天後`;
    }
    function dtCls(date){
      if(date<todayStr)return 'overdue';
      if(date===todayStr)return 'today-tag';
      return '';
    }
    function daysBetween(d1,d2){return Math.floor((new Date(d2)-new Date(d1))/(1000*60*60*24))}
    function fmtFull(date){return new Date(date).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'})}
    function emptyS(msg){return `<div class="empty-state"><span class="material-symbols-outlined">inbox</span><p>${msg}</p></div>`}

    function renderHouseworkCard(h){
      const col=areaColor(h.area);
      const dc=dtCls(h.reminderDate);
      const isSelected=hwSelected.has(h.id);
      let lastDoneHtml='';
      if(h.lastCompleted){
        const days=daysBetween(h.lastCompleted,todayStr);
        const daysLabel=days===0?'今天':days===1?'昨天':`${days} 天前`;
        lastDoneHtml=`<div class="last-done-info"><span class="material-symbols-outlined" style="font-size:13px;color:#cbd5e1">history</span><span style="font-size:13px;color:var(--text-secondary)">上次執行：${daysLabel}</span></div>`;
      }
      const weekendBadge=h.weekendMode?`<span class="badge-weekend"><span class="material-symbols-outlined" style="font-size:11px">weekend</span>週末</span>`:'';
      const selectCb=hwBatchMode?`<div class="hw-select-cb ${isSelected?'checked':''}" onclick="toggleHwSelect('${h.id}')"></div>`:'';
      const cardClick=hwBatchMode?`onclick="toggleHwSelect('${h.id}')"`:'' ;
      return `<div class="card p-4 mb-3 animate-in hw-card-selectable ${isSelected?'selected-card':''}" style="border-left:4px solid ${col.dot}" ${cardClick}>
        <div class="flex items-start gap-2">
          ${selectCb}
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap"><p class="font-semibold text-gray-800">${h.name}</p>${weekendBadge}</div>
            ${lastDoneHtml}
            ${h.reminderDate?`<div class="mt-2"><button class="date-tag ${dc}" onclick="${hwBatchMode?`toggleHwSelect('${h.id}')`:`openDelayModal('hw','${h.id}')`}" style="font-size:11px"><span class="material-symbols-outlined" style="font-size:12px">${dc==='overdue'?'warning':'event'}</span>${dtLbl(h.reminderDate)}</button></div>`:''}
          </div>
          <span class="badge" style="background:${col.bg};color:${col.dot};font-size:10px">${col.icon} ${h.area}</span>
          ${hwBatchMode?'':`<div style="position:relative">
            <button onclick="togglePopup('${h.id}',event)" style="background:var(--border-light);border:none;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer"><span class="material-symbols-outlined" style="font-size:18px;color:#64748b">more_vert</span></button>
            <div class="popup-menu" id="popup-${h.id}">
              <button onclick="openHouseworkModal('${h.id}')"><span class="material-symbols-outlined" style="font-size:16px;color:#6366f1">edit</span>修改</button>
              <button onclick="markHouseworkDone('${h.id}')"><span class="material-symbols-outlined" style="font-size:16px;color:#10b981">check_circle</span>標為完成</button>
              <button onclick="openDelayModal('hw','${h.id}')"><span class="material-symbols-outlined" style="font-size:16px;color:#f59e0b">schedule</span>延後</button>
              <button class="danger" onclick="deleteHousework('${h.id}')"><span class="material-symbols-outlined" style="font-size:16px">delete</span>刪除</button>
            </div>
          </div>`}
        </div>
      </div>`;
    }
    function renderHouseworkPage(){
      const allAreas=[...new Set(housework.map(h=>h.area))];
      document.getElementById('hw-area-chips').innerHTML=allAreas.map(a=>{
        const c=areaColor(a),cnt=housework.filter(h=>h.area===a).length,sel=hwAreaFilter===a;
        return `<div class="card area-chip p-4 ${sel?'selected':''}" onclick="toggleAreaFilter('${a}')" style="background:${sel?c.bg:'#fff'};border-color:${sel?c.dot:'transparent'}">
          <div class="flex items-center gap-2"><span style="font-size:24px">${c.icon}</span><div><p class="font-semibold text-gray-800 text-sm">${a}</p><p class="text-xs text-gray-400">${cnt} 項</p></div></div>
        </div>`;
      }).join('')+`<div class="card area-chip p-4 ${!hwAreaFilter?'selected':''}" onclick="toggleAreaFilter(null)" style="grid-column:span 2;text-align:center;${!hwAreaFilter?'background:#f1f5f9;border-color:#6366f1':''}">
        <p class="font-semibold text-gray-600 text-sm">全部（${housework.length}）</p></div>`;
      const overdueHW=housework.filter(h=>h.reminderDate&&h.reminderDate<todayStr);
      const notice=document.getElementById('hw-overdue-notice');
      if(notice){
        notice.innerHTML=overdueHW.length>0
          ?`<div class="overdue-notice"><span class="material-symbols-outlined" style="font-size:16px">warning</span>有 ${overdueHW.length} 件逾期項目，請開啟批次選取處理</div>`
          :'';
      }
      const filtered=hwAreaFilter?housework.filter(h=>h.area===hwAreaFilter):housework;
      document.getElementById('housework-cards').innerHTML=filtered.length?filtered.map(renderHouseworkCard).join(''):`<div class="card p-6">${emptyS('此區域無家事項目')}</div>`;
    }
    function toggleAreaFilter(a){hwAreaFilter=hwAreaFilter===a?null:a;renderHouseworkPage()}

    // SETTINGS & INIT
    function renderAll(){renderTodoPage();renderTasksPage();renderHouseworkPage();renderSettingsPage()}
    let appSettings=JSON.parse(localStorage.getItem('app_settings')||'{}');
    function saveSetting(key,val){appSettings[key]=val;localStorage.setItem('app_settings',JSON.stringify(appSettings))}
    function toggleSetting(key,btn){appSettings[key]=!appSettings[key];btn.classList.toggle('on',appSettings[key]);localStorage.setItem('app_settings',JSON.stringify(appSettings));renderAll()}
    function renderSettingsPage(){
      document.getElementById('set-name').value=appSettings.userName||'';
      document.getElementById('set-email').value=appSettings.userEmail||'';
      document.getElementById('tog-overdue').classList.toggle('on',appSettings.showOverdue!==false);
      document.getElementById('tog-notes').classList.toggle('on',appSettings.showNotes!==false);
      document.getElementById('tog-desc').classList.toggle('on',appSettings.showDesc!==false);
    }
    function exportData(){
      const data=JSON.stringify({tasks,housework,todo,settings:appSettings},null,2);
      const blob=new Blob([data],{type:'application/json'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='家事任務管理_'+todayStr+'.json';
      a.click();
    }
    function importData(e){
      const file=e.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=function(ev){
        try{
          const d=JSON.parse(ev.target.result);
          todo=d.todo||todo;
          tasks=d.tasks||tasks;
          housework=d.housework||housework;
          appSettings={...appSettings,...(d.settings||{})};
          saveData();
          renderAll();
          alert('匯入成功！');
        }catch(err){alert('匯入失敗')}
      };
      reader.readAsText(file);
      e.target.value='';
    }
    function copyShareLink(){
      const data=JSON.stringify({tasks,housework,todo});
      const url=location.origin+location.pathname+'#data='+btoa(unescape(encodeURIComponent(data)));
      navigator.clipboard.writeText(url).then(()=>alert('連結已複製')).catch(()=>prompt('複製此連結',url));
    }

    // Close popups when clicking outside
    document.addEventListener('click',()=>{
      document.querySelectorAll('.popup-menu').forEach(m=>m.classList.remove('show'));
    });

    loadData();
    renderAll();
  </script>
</body>
</html>
